name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent Pages deploy; cancel in-progress runs on a new push.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # bust.sh hashes the git SHA into the build-id badge; fetch a couple
          # of commits so the rev-parse short SHA resolves on fresh runners.
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      # bust.sh generates src/build-id.generated.ts (gitignored, referenced by
      # app.ts) and stamps cache-bust tokens. Must run before type-check,
      # otherwise TS bombs on the missing import. The `build` script's
      # prebuild hook runs it again — idempotent for the same token.
      - name: Generate build-id
        # Don't pass --quiet — the cache-busting skill's bust.sh has a
        # `[[ -z "$QUIET" ]] && echo …` pattern that trips set -e under
        # bash 5 in CI (works under bash 3.2 on macOS where set -e is
        # more permissive). Verbose mode echoes pass through cleanly.
        run: bash scripts/bust.sh

      - name: Type check
        run: npm run type-check

      - name: Smoke (chip)
        run: node scripts/smoke-test.mjs

      - name: Smoke (board)
        run: node scripts/smoke-test-board.mjs

      - name: Build
        env:
          # Routes Vite to a project-page base path. router.ts strips this at
          # runtime so /board still routes cleanly under /procedural-chip-texture/.
          GH_PAGES_BASE: /procedural-chip-texture/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
